name: CI

# france-opendata n'a pas de tests → import-smoke : l'install (deps de base) résout
# et `import france_opendata` charge tous les clients sans casser. Lib publiée PyPI
# + consommée en prod (oto-backend/cli/tuls) → catch un import mort avant release.
# Actions épinglées par SHA (supply-chain). Cf. otomata-private#39 (#5 + #6).
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install .
      - name: Smoke (import du package)
        run: python -c "import france_opendata; print('OK', france_opendata.__name__)"
