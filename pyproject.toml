[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "france-opendata"
version = "0.1.0"
description = "Connecteurs Python data publique France (open data) : Recherche Entreprises, Sirene, INPI/BCE (bilans), BODACC, DVF. Sans clé sauf Sirene (SIRENE_API_KEY env)."
requires-python = ">=3.10"
dependencies = ["requests>=2.31"]

[tool.setuptools.packages.find]
include = ["france_opendata*"]
