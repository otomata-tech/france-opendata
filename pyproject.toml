[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "france-opendata"
version = "0.14.0"
description = "Connecteurs Python data publique France (open data) : Recherche Entreprises, Sirene, INPI/BCE (bilans), BODACC, BOAMP (marchés publics), DVF+ Cerema (transactions immobilières, depuis 2014), BDTOPO, Sit@del, Géorisques (ICPE + risques naturels + argiles), Enedis (conso élec), BAN (géocodage), API Carto (cadastre), PVGIS (solaire), GPU (zonage PLU), QPV, INSEE Mélodi (socio-démo commune), EPFIF, licences spectacle (culture), FINESS + évaluations ESSMS HAS (santé). Client Opendatasoft générique. Sans clé sauf Sirene (SIRENE_API_KEY env)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["requests>=2.31"]

[project.optional-dependencies]
# Reader local de la stock SIRENE (parquet INSEE via DuckDB) — france_opendata.sirene_stock.
# Lourd, donc à la carte : `france-opendata[stock]`. Sans cet extra, seuls les clients API
# (sans clé / clé Sirene) sont disponibles.
stock = ["duckdb>=1.1"]
# Évaluations ESSMS HAS (DuckDB sur parquet distant httpfs) — france_opendata.has_essms.
sante = ["duckdb>=1.1"]

[tool.setuptools.packages.find]
include = ["france_opendata*"]
